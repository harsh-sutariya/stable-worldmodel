defaults:
  - _self_
  - launcher: local
  - data: pusht

hydra:
  job:
    chdir: true

output_model_name: lewm
subdir: ${output_model_name}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
embed_dim: 192
encoder_resnet9: False
train_value_function: False
projector_loss_weight: 1e-3
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: auto
  precision: bf16-mixed
  gradient_clip_val: 1.0

checkpointing:
  every_n_epochs: 5   # how often to save deployable .pt weights
  save_top_k: 3       # Lightning ckpts to retain (ranked by val/loss)
  save_last: true     # always keep last.ckpt for resumption

wandb:
  enabled: true
  project: stable-wm
  entity: null         # set to your W&B entity/username
  name: ${output_model_name}
  id: ${subdir}
  resume: allow
  log_model: false

loader:
  batch_size: 128
  num_workers: ${num_workers}
  drop_last: True
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True
  shuffle: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wm:
  history_size: 3
  num_preds: 1

model:
  _target_: stable_worldmodel.wm.lewm.LeWM
  encoder:
    _target_: stable_pretraining.backbone.utils.vit_hf
    size: ${encoder_scale}
    patch_size: ${patch_size}
    image_size: ${img_size}
    pretrained: false
    use_mask_token: false
  predictor:
    _target_: stable_worldmodel.wm.lewm.module.Predictor
    num_frames: ${wm.history_size}
    input_dim: ${embed_dim}
    hidden_dim: ${embed_dim}
    output_dim: ${embed_dim}
    depth: 6
    heads: 16
    mlp_dim: 2048
    dim_head: 64
    dropout: 0.1
    emb_dropout: 0.0
  action_encoder:
    _target_: stable_worldmodel.wm.lewm.module.Embedder
    input_dim: ???
    emb_dim: ${embed_dim}
  projector:
    _target_: stable_worldmodel.wm.lewm.module.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true
  pred_proj:
    _target_: stable_worldmodel.wm.lewm.module.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
  idm:
    enabled: true
    weight: 1.0

# IDM module — instantiated only when loss.idm.enabled is true
idm:
  _target_: stable_worldmodel.wm.pldm.module.MLP
  input_dim: ???     # set at runtime: 2 * embed_dim
  hidden_dim: 512
  output_dim: ???    # set at runtime: frameskip * action_dim

# Post-training pipeline — disabled by default; override per environment
post_training:
  run_probe: false
  run_eval: false
