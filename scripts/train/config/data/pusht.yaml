# @package _global_

data:
  dataset:
    num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
    frameskip: 5
    name: galilai-group/lewm-pusht
    keys_to_load:
      - pixels
      - action
      - proprio
      - state
    keys_to_cache:
      - action
      - proprio
      - state

# Run probing + CEM planning automatically after training
post_training:
  run_probe: true
  run_eval: true

  probe:
    dataset_name: galilai-group/lewm-pusht
    keys_to_load: [pixels, state, proprio]
    num_steps: 1
    frameskip: 1
    train_split: 0.9
    seed: 3072
    ridge_alpha: 1.0
    batch_size: 512
    probe_levels: [encoder_cls, encoder_patches, projector]
    probe_targets: [state, proprio]

  eval:
    # Environment
    env_name: swm/PushT-v1
    num_envs: 50
    max_episode_steps: 200
    seed: 42
    # CEM solver (Paper Appendix E)
    solver:
      _target_: stable_worldmodel.solver.CEMSolver
      model: ???
      batch_size: 1
      num_samples: 300
      var_scale: 1.0
      n_steps: 10
      topk: 30
    # Planning
    plan_config:
      horizon: 5
      receding_horizon: 5
      action_block: 5
    # Evaluation protocol (Paper Appendix E)
    num_eval: 50
    goal_offset_steps: 25
    eval_budget: 50
    dataset_name: pusht_expert_train.h5
    keys_to_cache: [action, proprio, state]
    callables:
      - method: _set_state
        args:
          state: {value: state}
      - method: _set_goal_state
        args:
          goal_state: {value: goal_state}
