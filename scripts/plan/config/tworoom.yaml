defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: 300  # 2× eval_budget
seed: 42
policy: lewm_tworoom_expert/weights_epoch_0010.pt

plan_config:
  horizon: 1
  receding_horizon: 1
  action_block: 5  # frameskip

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

# Paper Appendix E: TwoRoom evaluation settings
eval:
  num_eval: 50
  goal_offset_steps: 100  # goal sampled 100 steps ahead in trajectory
  eval_budget: 150         # agent has 150 steps to reach goal
  img_size: 56             # match training resolution
  dataset_name: tworoom.h5
  callables:
    - method: _set_state
      args:
        state:
          value: pos_agent
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_pos_agent

output:
  filename: tworoom_results.txt
